[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /ticket-logs/*.json.log
    Tag               ticket.backend
    Parser            ticket_json
    Read_from_Head    true
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    DB                /fluent-bit/state/ticket-backend-log-tail.db

[FILTER]
    Name   record_modifier
    Match  ticket.backend
    Record deployment.environment local
    Record service.namespace ticket-v2
    Record event.kind log

[OUTPUT]
    Name            opensearch
    Match           ticket.backend
    Host            opensearch
    Port            9200
    HTTP_User       ${OPENSEARCH_USER}
    HTTP_Passwd     ${OPENSEARCH_PASSWORD}
    Index           ticket-observability
    Logstash_Format On
    Logstash_Prefix ticket-observability
    Suppress_Type_Name On
    Replace_Dots    On
    tls             Off
