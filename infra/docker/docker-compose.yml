name: ${COMPOSE_PROJECT_NAME:-ticket-v2}

x-core-profiles: &core-profiles
  - local
  - dev
  - full

x-observability-profiles: &observability-profiles
  - dev
  - full

services:
  postgres:
    image: postgres:17-alpine
    container_name: ticket-postgres
    profiles: *core-profiles
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticket_platform}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      TICKET_DB_PASSWORD: ${TICKET_DB_PASSWORD:-ticket_dev_password}
      WORKFLOW_DB_PASSWORD: ${WORKFLOW_DB_PASSWORD:-workflow_dev_password}
      FILE_DB_PASSWORD: ${FILE_DB_PASSWORD:-file_dev_password}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notification_dev_password}
      REPORTING_DB_PASSWORD: ${REPORTING_DB_PASSWORD:-reporting_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_DB:-ticket_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ticket-platform

  kafka:
    image: apache/kafka:3.9.0
    container_name: ticket-kafka
    profiles: *core-profiles
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID:-1}@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-abcdefghijklmnopqrstuv}
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - ticket-platform

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: ticket-v2-keycloak
    profiles: *core-profiles
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
    volumes:
      - ../keycloak/ticket-management-realm.json:/opt/keycloak/data/import/ticket-management-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - ticket-platform

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: ticket-opensearch
    profiles: *observability-profiles
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Admin123!}
      plugins.security.ssl.http.enabled: "false"
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 20
    networks:
      - ticket-platform

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: ticket-opensearch-dashboards
    profiles: *observability-profiles
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - ticket-platform

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: ticket-jaeger
    profiles: *observability-profiles
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
    networks:
      - ticket-platform

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: ticket-otel-collector
    profiles: *observability-profiles
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ../observability/otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    depends_on:
      jaeger:
        condition: service_started
      opensearch:
        condition: service_healthy
    networks:
      - ticket-platform

  mailpit:
    image: axllent/mailpit:v1.22
    container_name: ticket-mailpit
    profiles: *core-profiles
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    networks:
      - ticket-platform

networks:
  ticket-platform:
    name: ticket-platform
    driver: bridge

volumes:
  postgres-data:
  opensearch-data:
