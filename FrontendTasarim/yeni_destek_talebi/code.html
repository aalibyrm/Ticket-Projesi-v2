<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yeni Destek Talebi - SupportHub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Outfit:wght@400;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100..900&amp;family=Outfit:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f3f3f8",
                        "inverse-on-surface": "#f0f0f5",
                        "on-tertiary-fixed-variant": "#464747",
                        "tertiary-fixed": "#e3e2e2",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-tint": "#b91e0b",
                        "secondary": "#5f5e5e",
                        "inverse-surface": "#2f3034",
                        "tertiary-container": "#545454",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#c7c6c6",
                        "on-tertiary-fixed": "#1b1c1c",
                        "secondary-fixed-dim": "#c8c6c5",
                        "primary-fixed-dim": "#ffb4a7",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f9f9fe",
                        "primary-fixed": "#ffdad4",
                        "on-secondary-fixed": "#1c1b1b",
                        "primary-container": "#aa1101",
                        "surface-container": "#ededf2",
                        "secondary-fixed": "#e5e2e1",
                        "surface-container-high": "#e8e8ed",
                        "outline-variant": "#e4beb7",
                        "surface-dim": "#d9dade",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e7",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#400200",
                        "inverse-primary": "#ffb4a7",
                        "on-surface": "#1a1c1f",
                        "secondary-container": "#e5e2e1",
                        "on-primary": "#ffffff",
                        "outline": "#90706a",
                        "on-error": "#ffffff",
                        "on-primary-container": "#ffb8ab",
                        "on-primary-fixed-variant": "#910b00",
                        "on-secondary-container": "#656464",
                        "on-surface-variant": "#5b403b",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f9f9fe",
                        "tertiary": "#3c3d3d",
                        "on-tertiary-container": "#cac8c8",
                        "on-background": "#1a1c1f",
                        "surface-container-highest": "#e2e2e7",
                        "primary": "#7f0900",
                        "background": "#f9f9fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-page": "32px",
                        "stack-lg": "24px",
                        "gutter": "16px",
                        "sidebar-width": "72px",
                        "stack-sm": "4px",
                        "base-unit": "8px",
                        "stack-md": "12px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Outfit"],
                        "body-md": ["DM Sans"],
                        "body-md-bold": ["DM Sans"],
                        "headline-lg": ["Outfit"],
                        "headline-md": ["Outfit"],
                        "caption": ["DM Sans"],
                        "label-sm": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "headline-sm": ["Outfit"]
                    },
                    "fontSize": {
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md-bold": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "caption": ["11px", { "lineHeight": "14px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #FCFCFC; }
        .input-underline {
            border: none;
            border-bottom: 1px solid #E5E5EA;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
            background-color: transparent;
            transition: border-color 0.2s;
        }
        .input-underline:focus {
            box-shadow: none;
            border-bottom: 2px solid #AA1101;
        }
    </style>
</head>
<body class="font-body-md text-on-surface antialiased flex">
<!-- SideNavBar Component (Suppressed due to form context, but included structure as hidden for potential toggle) -->
<nav class="hidden md:flex flex-col items-center py-base-unit z-50 bg-surface-container-lowest border-r border-surface-container-high fixed left-0 top-0 h-full w-[72px] transition-colors duration-200 ease-in-out">
<div class="mb-stack-lg">
<span class="font-headline-sm text-headline-sm text-primary material-symbols-outlined">api</span>
</div>
<div class="flex flex-col gap-stack-md w-full">
<a aria-label="Dashboard" class="w-full flex justify-center py-stack-sm text-secondary hover:bg-surface-container transition-colors duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined text-secondary hover:text-primary">dashboard</span>
</a>
<a aria-label="Inbox" class="w-full flex justify-center py-stack-sm text-secondary hover:bg-surface-container transition-colors duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined text-secondary hover:text-primary">inbox</span>
</a>
<a aria-label="Analytics" class="w-full flex justify-center py-stack-sm text-secondary hover:bg-surface-container transition-colors duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined text-secondary hover:text-primary">analytics</span>
</a>
<a aria-label="Customers" class="w-full flex justify-center py-stack-sm text-primary border-l-4 border-primary bg-surface-container-low transition-colors duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined text-primary">group</span>
</a>
<a aria-label="Settings" class="w-full flex justify-center py-stack-sm text-secondary hover:bg-surface-container transition-colors duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined text-secondary hover:text-primary">settings</span>
</a>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-1 md:ml-sidebar-width min-h-screen relative p-margin-page">
<!-- Minimal Top App Bar (Back/Close for transactional context) -->
<header class="flex justify-between items-center w-full mb-stack-lg">
<a class="flex items-center gap-2 text-secondary hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-body-md-bold text-body-md-bold">Geri Dön</span>
</a>
<div class="font-headline-sm text-headline-sm text-primary">SupportHub</div>
</header>
<div class="max-w-2xl mx-auto mt-12 bg-surface-container-lowest p-margin-page border border-surface-container-high rounded-none">
<div class="mb-stack-lg border-b border-surface-container-high pb-stack-md">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-2">Yeni Destek Talebi</h1>
<p class="font-body-md text-body-md text-secondary">Sorununuzu detaylıca açıklayın</p>
</div>
<form class="flex flex-col gap-stack-lg">
<!-- KONU -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-secondary uppercase" for="konu">KONU</label>
<input class="input-underline font-body-lg text-body-lg text-on-surface w-full" id="konu" name="konu" placeholder="Kısa bir özet" type="text"/>
</div>
<!-- KATEGORİ -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-secondary uppercase" for="kategori">KATEGORİ</label>
<select class="input-underline font-body-lg text-body-lg text-on-surface w-full appearance-none bg-transparent cursor-pointer" id="kategori" name="kategori">
<option disabled="" selected="" value="">Kategori seçin</option>
<option value="teknik">Teknik Sorun</option>
<option value="fatura">Fatura / Ödeme</option>
<option value="hesap">Hesap Erişimi</option>
<option value="diger">Diğer</option>
</select>
</div>
<!-- ÖNCELİK -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-secondary uppercase">ÖNCELİK</label>
<div class="flex gap-gutter">
<label class="cursor-pointer">
<input class="peer sr-only" name="oncelik" type="radio" value="dusuk"/>
<div class="px-4 py-1 rounded-lg bg-[#F4F4F5] border border-[#E5E5EA] font-body-md text-body-md text-on-surface peer-checked:bg-surface-container-high peer-checked:border-secondary transition-colors">
                                Düşük
                            </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="oncelik" type="radio" value="normal"/>
<div class="px-4 py-1 rounded-lg bg-[#F4F4F5] border border-[#E5E5EA] font-body-md text-body-md text-on-surface peer-checked:bg-surface-container-high peer-checked:border-secondary transition-colors">
                                Normal
                            </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="oncelik" type="radio" value="yuksek"/>
<div class="px-4 py-1 rounded-lg bg-[#F4F4F5] border border-[#E5E5EA] font-body-md text-body-md text-[#AA1101] peer-checked:bg-[#fcdcd9] peer-checked:border-[#AA1101] transition-colors">
                                Yüksek
                            </div>
</label>
</div>
</div>
<!-- AÇIKLAMA -->
<div class="flex flex-col gap-1 mt-4">
<label class="font-label-sm text-label-sm text-secondary uppercase" for="aciklama">AÇIKLAMA</label>
<textarea class="input-underline font-body-lg text-body-lg text-on-surface w-full resize-y" id="aciklama" name="aciklama" placeholder="Lütfen karşılaştığınız sorunu adımlarıyla belirtin..." rows="5"></textarea>
</div>
<!-- FILE UPLOAD -->
<div class="mt-2">
<label class="flex items-center justify-center w-full h-[48px] border border-dashed border-[#E5E5EA] bg-[#FCFCFC] hover:bg-[#F4F4F5] cursor-pointer transition-colors">
<input class="sr-only" type="file"/>
<span class="flex items-center gap-2 text-secondary font-body-md text-body-md">
<span class="material-symbols-outlined">attach_file</span>
                            Dosya ekle (Opsiyonel)
                        </span>
</label>
</div>
<!-- SUBMIT -->
<div class="flex justify-end mt-stack-md pt-stack-md border-t border-surface-container-high">
<button class="w-[160px] h-10 bg-[#AA1101] text-white font-body-md-bold text-body-md-bold rounded-lg hover:bg-primary transition-colors flex items-center justify-center" type="button">
                        Gönder
                    </button>
</div>
</form>
</div>
</main>
</body></html>
