<style>
    /* Custom shadow explicitly requested */
    .login-shadow {
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    
    /* Input underline animation */
    .input-underline {
        transition: border-color 0.2s ease-in-out;
    }
    .input-underline:focus {
        border-bottom-color: #AA1101;
        border-bottom-width: 2px;
        outline: none;
    }
</style>

<body class="bg-inverse-on-surface text-on-surface h-screen w-full flex items-center justify-center font-body-md m-0 p-0 overflow-hidden">
<!-- Center Card -->
<main class="w-[420px] bg-surface-container-lowest border border-surface-variant rounded-lg login-shadow p-10 flex flex-col box-border">
<!-- Brand -->
<div class="mb-8 flex flex-col items-center">
<div class="flex items-baseline">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Ticket</h1>
<span class="w-2 h-2 rounded-full bg-primary-container ml-1"></span>
</div>
<p class="font-body-md text-secondary mt-1">Destek Portalı</p>
</div>
<!-- Welcome -->
<div class="mb-8 w-full">
<h2 class="font-headline-lg text-headline-lg text-on-surface text-left">Hoş geldiniz</h2>
<p class="font-body-md text-secondary text-left mt-1 text-[15px]">Devam etmek için giriş yapın</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-6 w-full" method="POST">
<!-- Email Input -->
<div class="flex flex-col relative w-full">
<label class="font-label-sm text-[13px] text-secondary uppercase tracking-wider mb-1" for="email">E-POSTA</label>
<input class="input-underline appearance-none bg-transparent border-0 border-b border-surface-variant w-full py-2 px-0 text-on-surface font-body-md focus:ring-0" id="email" name="email" placeholder="ornek@firma.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col relative w-full mt-2">
<label class="font-label-sm text-[13px] text-secondary uppercase tracking-wider mb-1" for="password">ŞİFRE</label>
<div class="relative w-full">
<input class="input-underline appearance-none bg-transparent border-0 border-b border-surface-variant w-full py-2 px-0 pr-8 text-on-surface font-body-md focus:ring-0" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Şifreyi göster/gizle" class="absolute right-0 top-1/2 -translate-y-1/2 text-secondary hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex justify-between items-center w-full mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-surface-variant text-primary-container focus:ring-primary-container focus:ring-offset-0 bg-transparent" type="checkbox"/>
<span class="font-body-md text-secondary group-hover:text-on-surface transition-colors">Beni hatırla</span>
</label>
<a class="font-body-md-bold text-primary-container hover:text-primary transition-colors" href="#">Şifremi unuttum</a>
</div>
<!-- Primary Button -->
<button class="w-full h-12 bg-primary-container text-on-primary rounded font-body-md-bold mt-4 hover:bg-primary transition-colors flex items-center justify-center" type="submit">
                Giriş Yap
            </button>
</form>
<!-- Divider -->
<div class="flex items-center w-full my-6">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="px-4 font-body-md text-secondary text-[13px]">veya</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Secondary Action -->
<div class="text-center w-full">
<p class="font-body-md text-secondary">
                Hesabınız yok mu? <a class="font-body-md-bold text-primary-container hover:text-primary transition-colors" href="#">Kayıt olun</a>
</p>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
