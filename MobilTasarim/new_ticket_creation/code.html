<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yeni Talep - Support System</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&amp;family=Outfit:wght@500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed-dim": "#c8c6c5",
                        "on-secondary-fixed-variant": "#464747",
                        "on-primary-fixed-variant": "#910b00",
                        "surface-bright": "#f9f9fe",
                        "primary-container": "#aa1101",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e8e8ed",
                        "secondary-fixed-dim": "#c7c6c6",
                        "surface": "#f9f9fe",
                        "inverse-surface": "#2f3034",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9dade",
                        "surface-tint": "#b91e0b",
                        "on-secondary-container": "#646464",
                        "inverse-primary": "#ffb4a7",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1a1c1f",
                        "background": "#f9f9fe",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#ffdad4",
                        "primary-fixed-dim": "#ffb4a7",
                        "tertiary": "#3e3d3d",
                        "secondary-container": "#e3e2e2",
                        "surface-variant": "#e2e2e7",
                        "surface-container": "#ededf2",
                        "on-background": "#1a1c1f",
                        "primary": "#7f0900",
                        "on-tertiary-fixed-variant": "#474646",
                        "on-primary-fixed": "#400200",
                        "on-secondary-fixed": "#1b1c1c",
                        "outline": "#90706a",
                        "tertiary-fixed": "#e5e2e1",
                        "tertiary-container": "#555454",
                        "surface-container-low": "#f3f3f8",
                        "secondary": "#5e5e5e",
                        "inverse-on-surface": "#f0f0f5",
                        "secondary-fixed": "#e3e2e2",
                        "on-surface-variant": "#5b403b",
                        "on-tertiary-container": "#cbc8c8",
                        "on-tertiary-fixed": "#1c1b1b",
                        "surface-container-highest": "#e2e2e7",
                        "on-primary-container": "#ffb8ab",
                        "error": "#ba1a1a",
                        "outline-variant": "#e4beb7",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "unit": "4px",
                        "gutter": "16px",
                        "stack-md": "16px",
                        "container-margin": "24px"
                    },
                    fontFamily: {
                        "headline-md": ["Outfit", "sans-serif"],
                        "headline-lg": ["Outfit", "sans-serif"],
                        "body-lg": ["DM Sans", "sans-serif"],
                        "body-md": ["DM Sans", "sans-serif"],
                        "label-sm": ["DM Sans", "sans-serif"],
                        "headline-lg-mobile": ["Outfit", "sans-serif"],
                        "display": ["Outfit", "sans-serif"],
                        "stats-lg": ["Outfit", "sans-serif"]
                    },
                    fontSize: {
                        "headline-md": ["20px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["15px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-sm": ["13px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "stats-lg": ["36px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-x-hidden selection:bg-primary-container selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full h-[56px] border-b border-surface-variant flex items-center justify-between px-gutter z-50 bg-surface transition-colors duration-200">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-start text-on-surface hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface truncate px-4">Support System</h1>
<button aria-label="More options" class="w-10 h-10 flex items-center justify-end text-on-surface hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined text-[24px]">more_vert</span>
</button>
</header>
<!-- Main Content -->
<main class="pt-[80px] pb-[140px] px-gutter w-full max-w-[390px] mx-auto">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-lg">Yeni Talep</h2>
<form action="#" class="flex flex-col gap-[28px]" method="POST">
<!-- Konu Input -->
<div class="flex flex-col relative group">
<label class="font-label-sm text-label-sm text-secondary mb-1" for="konu">KONU</label>
<input class="w-full bg-transparent border-0 border-b border-surface-variant px-0 py-2 font-body-md text-body-md text-on-surface placeholder:text-on-tertiary-container focus:ring-0 focus:border-on-surface transition-colors" id="konu" name="konu" placeholder="Talep konusunu giriniz" type="text"/>
</div>
<!-- Kategori Dropdown -->
<div class="flex flex-col relative group">
<label class="font-label-sm text-label-sm text-secondary mb-1" for="kategori">KATEGORİ</label>
<div class="relative w-full">
<select class="w-full bg-transparent border-0 border-b border-surface-variant px-0 py-2 pr-8 font-body-md text-body-md text-on-surface appearance-none focus:ring-0 focus:border-on-surface transition-colors cursor-pointer" id="kategori" name="kategori">
<option disabled="" selected="" value="">Kategori seçiniz</option>
<option value="teknik">Teknik Destek</option>
<option value="fatura">Fatura İşlemleri</option>
<option value="diger">Diğer</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-secondary pointer-events-none text-[20px]">expand_more</span>
</div>
</div>
<!-- Öncelik Chips -->
<div class="flex flex-col">
<label class="font-label-sm text-label-sm text-secondary mb-3">ÖNCELİK</label>
<div class="flex items-center gap-3">
<label class="cursor-pointer">
<input class="peer sr-only" name="oncelik" type="radio" value="dusuk"/>
<div class="px-4 py-[6px] rounded-full bg-surface-container text-on-surface font-label-sm text-label-sm border border-transparent peer-checked:border-on-surface transition-all">
                            Düşük
                        </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="oncelik" type="radio" value="normal"/>
<div class="px-4 py-[6px] rounded-full bg-surface-container text-on-surface font-label-sm text-label-sm border border-transparent peer-checked:border-on-surface transition-all">
                            Normal
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="oncelik" type="radio" value="yuksek"/>
<div class="px-4 py-[6px] rounded-full bg-error-container text-on-error-container font-label-sm text-label-sm border border-transparent peer-checked:border-on-error-container transition-all">
                            Yüksek
                        </div>
</label>
</div>
</div>
<!-- Açıklama Textarea -->
<div class="flex flex-col relative group">
<label class="font-label-sm text-label-sm text-secondary mb-1" for="aciklama">AÇIKLAMA</label>
<textarea class="w-full bg-transparent border-0 border-b border-surface-variant px-0 py-2 font-body-md text-body-md text-on-surface placeholder:text-on-tertiary-container focus:ring-0 focus:border-on-surface transition-colors min-h-[140px] resize-none" id="aciklama" name="aciklama" placeholder="Detaylı bilgi veriniz..."></textarea>
</div>
<!-- File Upload -->
<div class="w-full h-[52px] border border-dashed border-surface-variant rounded-DEFAULT flex items-center justify-center gap-2 cursor-pointer hover:bg-surface-container-low transition-colors mt-2">
<span class="material-symbols-outlined text-secondary text-[20px]">attach_file</span>
<span class="font-label-sm text-label-sm text-secondary">Dosya ekle</span>
<input class="hidden" type="file"/>
</div>
</form>
</main>
<!-- Fixed Bottom Button Area -->
<div class="fixed bottom-[72px] left-0 w-full px-gutter z-40 bg-gradient-to-t from-surface via-surface to-transparent pb-2 pt-6">
<button class="w-full h-[52px] bg-primary-container text-on-primary rounded-lg font-label-sm text-label-sm flex items-center justify-center transition-opacity hover:opacity-90 active:scale-[0.98]">
            Gönder
        </button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface border-t border-surface-variant h-[56px] px-2">
<!-- Active: Yeni Talep -->
<a aria-current="page" class="flex flex-col items-center justify-center text-on-surface relative w-16 h-full before:content-[''] before:absolute before:top-0 before:w-1 before:h-1 before:bg-primary-container before:rounded-full transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-sm text-[10px] mt-1">Yeni Talep</span>
</a>
<!-- Inactive: Taleplerim -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant hover:opacity-80 transition-all active:scale-95 w-16 h-full" href="#">
<span class="material-symbols-outlined text-[24px]">history</span>
<span class="font-label-sm text-[10px] mt-1">Taleplerim</span>
</a>
<!-- Inactive: Mesajlar -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant hover:opacity-80 transition-all active:scale-95 w-16 h-full" href="#">
<span class="material-symbols-outlined text-[24px]">chat_bubble</span>
<span class="font-label-sm text-[10px] mt-1">Mesajlar</span>
</a>
<!-- Inactive: Profil -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant hover:opacity-80 transition-all active:scale-95 w-16 h-full" href="#">
<span class="material-symbols-outlined text-[24px]">person</span>
<span class="font-label-sm text-[10px] mt-1">Profil</span>
</a>
</nav>
</body></html>
