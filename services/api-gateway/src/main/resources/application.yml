server:
  port: ${API_GATEWAY_PORT:8088}

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ticket-management}
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - RemoveRequestHeader=Cookie
            - RemoveRequestHeader=Set-Cookie
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          routes:
            - id: ticket-service-agent-v1
              uri: ${TICKET_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/agent/tickets,/api/v1/agent/tickets/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - id: ticket-service-v1
              uri: ${TICKET_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/tickets,/api/v1/tickets/**,/api/v1/products,/api/v1/products/**,/api/v1/ticket-topics,/api/v1/ticket-topics/**,/api/v1/organization,/api/v1/organization/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - id: file-service-v1
              uri: ${FILE_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/files,/api/v1/files/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - id: workflow-sla-service-v1
              uri: ${WORKFLOW_SLA_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/v1/workflows,/api/v1/workflows/**,/api/v1/sla,/api/v1/sla/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - id: notification-service-v1
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/notifications,/api/v1/notifications/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - id: reporting-service-v1
              uri: ${REPORTING_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/v1/reports,/api/v1/reports/**
              filters:
                - RewritePath=/api/v1/(?<segment>.*), /api/$\{segment}
            - id: ticket-service-agent
              uri: ${TICKET_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/agent/tickets,/api/agent/tickets/**
            - id: ticket-service
              uri: ${TICKET_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/tickets,/api/tickets/**,/api/products,/api/products/**,/api/ticket-topics,/api/ticket-topics/**,/api/organization,/api/organization/**
            - id: file-service
              uri: ${FILE_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/files,/api/files/**
            - id: workflow-sla-service
              uri: ${WORKFLOW_SLA_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/workflows,/api/workflows/**,/api/sla,/api/sla/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/notifications,/api/notifications/**
            - id: reporting-service
              uri: ${REPORTING_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/reports,/api/reports/**

app:
  cors:
    allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    jwt:
      enabled: ${GATEWAY_JWT_ENABLED:true}
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    capacity: ${GATEWAY_RATE_LIMIT_CAPACITY:120}
    window: ${GATEWAY_RATE_LIMIT_WINDOW:PT1M}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: api-gateway
    description: Ticket Management API Gateway
