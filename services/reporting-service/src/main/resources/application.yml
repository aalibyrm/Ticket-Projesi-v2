server:
  port: ${REPORTING_SERVICE_PORT:8085}

spring:
  application:
    name: reporting-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ticket-management}
  datasource:
    url: ${REPORTING_DB_URL:jdbc:postgresql://localhost:5432/ticket_platform}
    username: ${REPORTING_DB_USER:reporting_app}
    password: ${REPORTING_DB_PASSWORD:reporting_dev_password}
    hikari:
      pool-name: reporting-service-pool
      maximum-pool-size: ${REPORTING_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${REPORTING_DB_POOL_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: reporting_schema
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: reporting_schema
    default-schema: reporting_schema
    table: flyway_schema_history
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: ${REPORTING_KAFKA_GROUP_ID:reporting-service}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  paths-to-match:
    - /api/**

app:
  kafka:
    topics:
      ticket-events: ${TICKET_EVENTS_TOPIC:ticket.events.v1}
      workflow-events: ${WORKFLOW_EVENTS_TOPIC:workflow.events.v1}
  security:
    jwt:
      enabled: ${REPORTING_SERVICE_JWT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: reporting-service
    description: Reporting projection and manager dashboard API service
