server:
  port: ${TICKET_SERVICE_PORT:8081}

spring:
  application:
    name: ticket-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ticket-management}
  datasource:
    url: ${TICKET_DB_URL:jdbc:postgresql://localhost:5432/ticket_platform}
    username: ${TICKET_DB_USER:ticket_app}
    password: ${TICKET_DB_PASSWORD:ticket_dev_password}
    hikari:
      pool-name: ticket-service-pool
      maximum-pool-size: ${TICKET_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${TICKET_DB_POOL_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ticket_schema
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: ticket_schema
    default-schema: ticket_schema
    table: flyway_schema_history
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  paths-to-match:
    - /api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ticket-service
    description: Core ticket domain service

app:
  outbox:
    publisher:
      enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
      batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:50}
      max-retries: ${OUTBOX_PUBLISHER_MAX_RETRIES:5}
      fixed-delay-ms: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}
      initial-delay-ms: ${OUTBOX_PUBLISHER_INITIAL_DELAY_MS:10000}
      retry-backoff-ms: ${OUTBOX_PUBLISHER_RETRY_BACKOFF_MS:30000}
      processing-timeout-ms: ${OUTBOX_PUBLISHER_PROCESSING_TIMEOUT_MS:300000}
      send-timeout-ms: ${OUTBOX_PUBLISHER_SEND_TIMEOUT_MS:10000}
  clients:
    file-service:
      base-url: ${FILE_SERVICE_URL:http://localhost:8082}
  security:
    jwt:
      enabled: ${TICKET_SERVICE_JWT_ENABLED:true}
