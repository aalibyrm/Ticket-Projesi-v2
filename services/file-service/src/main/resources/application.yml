server:
  port: ${FILE_SERVICE_PORT:8082}

spring:
  application:
    name: file-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ticket-management}
  datasource:
    url: ${FILE_DB_URL:jdbc:postgresql://localhost:5432/ticket_platform}
    username: ${FILE_DB_USER:file_app}
    password: ${FILE_DB_PASSWORD:file_dev_password}
    hikari:
      pool-name: file-service-pool
      maximum-pool-size: ${FILE_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${FILE_DB_POOL_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: file_schema
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: file_schema
    default-schema: file_schema
    table: flyway_schema_history
    locations: classpath:db/migration

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  paths-to-match:
    - /api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: file-service
    description: Attachment metadata and object storage integration service

app:
  clients:
    ticket-service:
      base-url: ${TICKET_SERVICE_URL:http://localhost:8081}
  file-validation:
    max-size-bytes: ${FILE_VALIDATION_MAX_SIZE_BYTES:10485760}
    preview-max-bytes: ${FILE_VALIDATION_PREVIEW_MAX_BYTES:65536}
    allowed-extensions: ${FILE_VALIDATION_ALLOWED_EXTENSIONS:log,txt,png,jpg,jpeg,pdf}
    allowed-content-types: ${FILE_VALIDATION_ALLOWED_CONTENT_TYPES:text/plain,image/png,image/jpeg,application/pdf}
    text-extensions: ${FILE_VALIDATION_TEXT_EXTENSIONS:log,txt}
    text-content-types: ${FILE_VALIDATION_TEXT_CONTENT_TYPES:text/plain}
    log-keywords: ${FILE_VALIDATION_LOG_KEYWORDS:error,exception,stacktrace,traceback,failed}
  security:
    jwt:
      enabled: ${FILE_SERVICE_JWT_ENABLED:true}
  storage:
    r2:
      enabled: ${R2_ENABLED:false}
      endpoint: ${R2_ENDPOINT:}
      region: ${R2_REGION:auto}
      bucket: ${R2_BUCKET:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      presign-upload-ttl: ${R2_PRESIGN_UPLOAD_TTL:PT10M}
      presign-download-ttl: ${R2_PRESIGN_DOWNLOAD_TTL:PT5M}
