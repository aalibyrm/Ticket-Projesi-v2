spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    schemas: notification_schema
    default-schema: notification_schema
    locations: classpath:db/migration
  kafka:
    listener:
      auto-startup: false
  mail:
    host: localhost
    port: 1025

app:
  security:
    jwt:
      enabled: false

management:
  health:
    mail:
      enabled: false
