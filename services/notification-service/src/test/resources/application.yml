spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    schemas: notification_schema
    default-schema: notification_schema
    locations: classpath:db/migration
  kafka:
    listener:
      auto-startup: false
  mail:
    host: localhost
    port: 1025

app:
  security:
    jwt:
      enabled: false
  email:
    delivery:
      retry:
        enabled: false
        fixed-delay-ms: 30000
        batch-size: 10
        max-attempts: 3
        backoff: 0
        processing-lease: 1000

management:
  health:
    mail:
      enabled: false
