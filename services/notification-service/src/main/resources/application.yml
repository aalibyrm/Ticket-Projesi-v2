server:
  port: ${NOTIFICATION_SERVICE_PORT:8084}

spring:
  application:
    name: notification-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ticket-management}
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/ticket_platform}
    username: ${NOTIFICATION_DB_USER:notification_app}
    password: ${NOTIFICATION_DB_PASSWORD:notification_dev_password}
    hikari:
      pool-name: notification-service-pool
      maximum-pool-size: ${NOTIFICATION_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${NOTIFICATION_DB_POOL_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notification_schema
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: notification_schema
    default-schema: notification_schema
    table: flyway_schema_history
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: ${NOTIFICATION_KAFKA_GROUP_ID:notification-service}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
  mail:
    host: ${NOTIFICATION_SMTP_HOST:localhost}
    port: ${NOTIFICATION_SMTP_PORT:1025}
    username: ${NOTIFICATION_SMTP_USERNAME:}
    password: ${NOTIFICATION_SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${NOTIFICATION_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${NOTIFICATION_SMTP_STARTTLS_ENABLE:false}
      mail.smtp.connectiontimeout: ${NOTIFICATION_SMTP_CONNECTION_TIMEOUT_MS:5000}
      mail.smtp.timeout: ${NOTIFICATION_SMTP_READ_TIMEOUT_MS:5000}
      mail.smtp.writetimeout: ${NOTIFICATION_SMTP_WRITE_TIMEOUT_MS:5000}

app:
  kafka:
    topics:
      ticket-events: ${TICKET_EVENTS_TOPIC:ticket.events.v1}
      workflow-events: ${WORKFLOW_EVENTS_TOPIC:workflow.events.v1}
  security:
    jwt:
      enabled: ${NOTIFICATION_SERVICE_JWT_ENABLED:true}
  email:
    sender:
      from-address: ${NOTIFICATION_EMAIL_FROM:no-reply@ticket.local}
      from-name: ${NOTIFICATION_EMAIL_FROM_NAME:Ticket Management}
    delivery:
      retry:
        enabled: ${NOTIFICATION_EMAIL_RETRY_ENABLED:true}
        fixed-delay-ms: ${NOTIFICATION_EMAIL_RETRY_FIXED_DELAY_MS:30000}
        batch-size: ${NOTIFICATION_EMAIL_RETRY_BATCH_SIZE:25}
        max-attempts: ${NOTIFICATION_EMAIL_RETRY_MAX_ATTEMPTS:3}
        backoff: ${NOTIFICATION_EMAIL_RETRY_BACKOFF_MS:60000}
        processing-lease: ${NOTIFICATION_EMAIL_RETRY_PROCESSING_LEASE_MS:300000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: notification-service
    description: UI notification and email delivery service
