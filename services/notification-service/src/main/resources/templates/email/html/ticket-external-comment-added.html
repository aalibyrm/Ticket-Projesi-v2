<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>New external comment</title>
</head>
<body>
  <p>Hello <span th:text="${recipientName}">recipient</span>,</p>
  <p>
    A new external comment was added to ticket
    <strong th:text="${ticketNumber}">TCK-0000</strong>.
  </p>
  <p>Author: <span th:text="${commentAuthorName}">author</span></p>
  <blockquote th:text="${commentPreview}">comment preview</blockquote>
  <p th:if="${ticketUrl != null and !#strings.isEmpty(ticketUrl)}">
    <a th:href="${ticketUrl}">Open ticket</a>
  </p>
</body>
</html>
