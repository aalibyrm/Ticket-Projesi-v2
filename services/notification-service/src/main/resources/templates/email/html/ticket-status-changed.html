<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket status changed</title>
</head>
<body>
  <p>Hello <span th:text="${recipientName}">recipient</span>,</p>
  <p>
    Ticket <strong th:text="${ticketNumber}">TCK-0000</strong> status changed.
  </p>
  <ul>
    <li>Previous status: <span th:text="${previousStatus}">OPEN</span></li>
    <li>New status: <span th:text="${newStatus}">IN_PROGRESS</span></li>
  </ul>
  <p th:if="${ticketUrl != null and !#strings.isEmpty(ticketUrl)}">
    <a th:href="${ticketUrl}">Open ticket</a>
  </p>
</body>
</html>
