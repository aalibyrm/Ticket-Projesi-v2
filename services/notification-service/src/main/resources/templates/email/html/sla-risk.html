<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>SLA risk</title>
</head>
<body>
  <p>Hello <span th:text="${recipientName}">recipient</span>,</p>
  <p>
    Ticket <strong th:text="${ticketNumber}">TCK-0000</strong> is at SLA risk.
  </p>
  <ul>
    <li>Risk reason: <span th:text="${riskReason}">risk reason</span></li>
    <li>SLA deadline: <span th:text="${slaDeadline}">deadline</span></li>
  </ul>
  <p th:if="${ticketUrl != null and !#strings.isEmpty(ticketUrl)}">
    <a th:href="${ticketUrl}">Open ticket</a>
  </p>
</body>
</html>
