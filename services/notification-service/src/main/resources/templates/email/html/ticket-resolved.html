<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket resolved</title>
</head>
<body>
  <p>Hello <span th:text="${recipientName}">recipient</span>,</p>
  <p>
    Ticket <strong th:text="${ticketNumber}">TCK-0000</strong> was resolved.
  </p>
  <p>Resolution summary: <span th:text="${resolutionSummary}">summary</span></p>
  <p>Resolved at: <span th:text="${resolvedAt}">timestamp</span></p>
  <p th:if="${ticketUrl != null and !#strings.isEmpty(ticketUrl)}">
    <a th:href="${ticketUrl}">Open ticket</a>
  </p>
</body>
</html>
